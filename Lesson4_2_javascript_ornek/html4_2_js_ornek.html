<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div>
        <label>1.Sayı</label>
        <input type="text" id="sayi1" />

    </div>
    <div>
        <label>2. Sayı</label>
        <input type="text" id="sayi2" />
    </div>
    <div>
        <input type="button" onclick="SayiAralikToplami()" id="hesapla" value="HESAPLA" />
    </div>
    <div>
        <input type="button" onclick="Sirala()" id="hesapla" value="SIRALA" />
        <!--
            Soru-2:
            girilen 2 sayıdan küçük sayıyı bularak küçük sayıdan 0 a kadar olan sayıları ekranda yazınız?
            -->
    </div>
    <p id="sonucGoster">  </p>
    <p id="siralaGoster">  </p>

    <script>
        //html kodları içinde input lar ile kullanıcıdan 2 sayı alınız. Bu sayılar arasındaki sayıların toplam hesabını yapan SayiAralikToplami() adında function ile hesaplayınız?



        function SayiAralikToplami() {
            //document.getElementById("sayi2").value string olarak verir, sayısal yapmak için parseInt(),parseFloat() kullanılmalıdır
            var sayi1 = parseInt(document.getElementById("sayi1").value);
            var sayi2 = parseInt(document.getElementById("sayi2").value);
            var toplam = 0;
            var buyukSayi;
            var kucukSayi;

            if (sayi1 > sayi2) {
                buyukSayi = sayi1;
                kucukSayi = sayi2;

            }
            else if (sayi2 > sayi1) {
                buyukSayi = sayi2;
                kucukSayi = sayi1;

            }

            while (buyukSayi >= kucukSayi) {
                toplam = toplam + kucukSayi;
                kucukSayi++;
            }

            document.getElementById("sonucGoster").innerHTML = "Toplam:" + toplam;
        }


        function Sirala() {
            var sayi1 = parseInt(document.getElementById("sayi1").value);
            var sayi2 = parseInt(document.getElementById("sayi2").value);
            var kucukSayi;
            if (sayi1 > sayi2) {
                kucukSayi = sayi2;
            }
            else {
                kucukSayi = sayi1;
            }

            var goster = "";

            if (kucukSayi > 0) {

                while (kucukSayi >= 0) {
                    goster = goster + kucukSayi + ",";
                    kucukSayi--;
                }
            }
            else {
                while (kucukSayi < 0) {
                    goster = goster + kucukSayi + ",";
                    kucukSayi++;
                }
            }
                document.getElementById("siralaGoster").innerHTML = goster;





        }



    </script>
</body>
</html>
